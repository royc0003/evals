# Copy this file and replace each CHANGE_ME value for your fine-tuned model.
evaluation:
  # Filesystem-safe name used in result directory names.
  label: my-qwen-finetune
  canonical: false

# The evaluator connects here. Use localhost when working through an SSH
# tunnel to a vLLM server bound to the GPU node's loopback interface.
base_url: http://localhost:8000/v1

# CHANGE_ME: exact model ID returned by GET /v1/models.
model: my-qwen-finetune

# CHANGE_ME: final model or adapter repository/path and immutable revision.
source_model: my-org/qwen3.5-9b-finetuned
model_revision: CHECKPOINT_COMMIT_OR_SHA256

fine_tuning:
  # CHANGE_ME: lora for an adapter, or merged for complete model weights.
  type: lora
  # CHANGE_ME: immutable identity of the checkpoint that was fine-tuned.
  base_model: Qwen/Qwen3.5-9B
  base_revision: c202236235762e1c871ad0ccb60c8ee5ba337b9a
  # CHANGE_ME: local path or model repository containing the evaluated weights.
  artifact: /home/ubuntu/models/my-qwen-finetune
  # CHANGE_ME: disclose training sources and any AIME 2026 overlap.
  training_data_disclosure: >-
    Describe the training data and whether benchmark questions were included.

serving:
  expected_vllm_version: 0.24.0
  # CHANGE_ME when the serving hardware or topology differs.
  gpu: H100 80GB
  gpus_used: 1
  dtype: bfloat16
  tensor_parallel_size: 1
  max_model_len: 262144
